services:
  db:
    image: pgvector/pgvector:pg16
    container_name: context_kernel_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: kernel
      POSTGRES_PASSWORD: kernel
      POSTGRES_DB: context_kernel
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kernel -d context_kernel"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
